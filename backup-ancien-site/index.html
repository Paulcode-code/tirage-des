<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tirage de dés</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Tirage de dés</h1>

    <section class="card">
      <label for="mode">Mode de tirage</label>
      <select id="mode">
        <option value="1">Mode 1 — vrais dés aléatoires</option>
        <option value="2">Mode 2 — paquet de 36 tirages</option>
        <option value="3">Mode 3 — probabilités rééquilibrées</option>
      </select>

      <div class="stats">
        <span>Tirages effectués</span>
        <strong id="nb-tirages">0</strong>
      </div>

      <div id="resultat" class="resultat">Clique sur Tirer</div>

      <div id="boutons-secondaires" class="ligne-boutons">
        <button id="btn-details" type="button">Voir les probabilités</button>
        <button id="btn-reset" type="button">Reset</button>
      </div>

      <button id="btn-tirer" class="bouton-principal" type="button">Tirer</button>

      <div id="details" class="details"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
